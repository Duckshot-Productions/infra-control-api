name: Deploy VPS Control Plane

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy
          - restart
          - status
          - run-scraper
          - query-state
      target:
        description: 'Target (for run-scraper action)'
        required: false
        default: 'all'

jobs:
  deploy:
    if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_TAILSCALE_IP }} >> ~/.ssh/known_hosts
      
      - name: Deploy control plane
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_TAILSCALE_IP }} << 'ENDSSH'
            cd /opt/infra-control-api || mkdir -p /opt/infra-control-api
            git pull || git clone https://github.com/DuckshotPro/infra-control-api.git .
            
            # Setup Python venv if needed
            python3 -m venv venv || true
            source venv/bin/activate
            pip install -r requirements.txt
            
            # Stop existing service
            sudo systemctl stop infra-control-api || true
            
            # Copy systemd service
            sudo cp infra-control-api.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable infra-control-api
            sudo systemctl start infra-control-api
            
            echo "✅ Control plane deployed and running"
          ENDSSH
      
      - name: Verify deployment
        run: |
          sleep 5
          curl -H "Authorization: Bearer ${{ secrets.CONTROL_API_TOKEN }}" \
            https://${{ secrets.VPS_TAILSCALE_IP }}:5000/health

  run-action:
    if: github.event.inputs.action != 'deploy' && github.event.inputs.action != ''
    runs-on: ubuntu-latest
    steps:
      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      
      - name: Execute action
        id: execute
        run: |
          ACTION="${{ github.event.inputs.action }}"
          TARGET="${{ github.event.inputs.target }}"
          
          case $ACTION in
            restart)
              ENDPOINT="/admin/restart"
              PAYLOAD='{}'
              ;;
            status)
              ENDPOINT="/query-state"
              PAYLOAD='{}'
              ;;
            run-scraper)
              ENDPOINT="/run-scraper"
              PAYLOAD='{"target": "'$TARGET'"}'
              ;;
            query-state)
              ENDPOINT="/query-state"
              PAYLOAD='{}'
              ;;
          esac
          
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.CONTROL_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            https://${{ secrets.VPS_TAILSCALE_IP }}:5000$ENDPOINT)
          
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          echo "$RESPONSE" | jq .
      
      - name: Comment on commit (if applicable)
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const response = ${{ steps.execute.outputs.response }};
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🤖 **Action Result**\n\`\`\`json\n${JSON.stringify(response, null, 2)}\n\`\`\``
            });
